<div
  class="modal"
  id="modal--editTagAlias"
  role="dialog"
  aria-label="Edit Tag Alias"
>
  <div class="modal-background"></div>
  <div class="modal-card">
    <div class="modal-card-head">
      <p class="modal-card-title">Edit Tag Alias</p>
      <button
        class="delete is-close-modal-button"
        type="button"
        aria-label="close"
      ></button>
    </div>
    <section class="modal-card-body">
      <form id="form--editTagAlias">
        <input
          id="editTagAlias--oldTagNameAlias"
          name="oldTagNameAlias"
          type="hidden"
        />
        <div class="field">
          <label class="label" for="editTagAlias--tagNameAlias">
            Alias
          </label>
          <div class="control">
            <input
              class="input"
              id="editTagAlias--tagNameAlias"
              name="tagNameAlias"
              type="text"
              maxlength="50"
              required
            />
          </div>
        </div>
        <div class="field">
          <label class="label" for="editTagAlias--tagName">
            Related Tag
          </label>
          <div class="control">
            <input
              class="input"
              id="editTagAlias--tagName"
              name="tagName"
              type="text"
              list="editTagAlias--tagNameSuggestions"
              maxlength="50"
              required
            />
            <datalist id="editTagAlias--tagNameSuggestions"></datalist>
          </div>
          <p class="help">The related tag does not need to exist in Tag Management.</p>
        </div>
      </form>
    </section>
    <footer class="modal-card-foot is-justify-content-right">
      <div class="buttons">
        <button
          class="button is-success"
          type="submit"
          form="form--editTagAlias"
        >
          <span class="icon"><i class="fa-solid fa-save"></i></span>
          <span>Update Tag Alias</span>
        </button>
        <button class="button is-close-modal-button" type="button">
          Cancel
        </button>
      </div>
    </footer>
  </div>
</div>
