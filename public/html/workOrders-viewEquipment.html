<div
  class="modal"
  id="modal--viewWorkOrderEquipment"
  role="dialog"
  aria-label="Equipment Details"
>
  <div class="modal-background"></div>
  <div class="modal-card">
    <div class="modal-card-head">
      <p class="modal-card-title"><span data-section-alias="equipmentSectionNameSingular">Equipment</span> Details</p>
      <button
        class="delete is-close-modal-button"
        type="button"
        aria-label="close"
      ></button>
    </div>
    <section class="modal-card-body">
      <div class="field">
        <label class="label"><span data-section-alias="equipmentSectionNameSingular">Equipment</span> Name</label>
        <p id="viewWorkOrderEquipment--equipmentName"></p>
      </div>
      <div class="field">
        <label class="label"><span data-section-alias="equipmentSectionNameSingular">Equipment</span> Number</label>
        <p id="viewWorkOrderEquipment--equipmentNumber"></p>
      </div>
      <div class="field" id="viewWorkOrderEquipment--equipmentTypeContainer">
        <label class="label"><span data-section-alias="equipmentSectionNameSingular">Equipment</span> Type</label>
        <p id="viewWorkOrderEquipment--equipmentTypeDataListItem"></p>
      </div>
      <div class="field" id="viewWorkOrderEquipment--descriptionContainer">
        <label class="label">Description</label>
        <p id="viewWorkOrderEquipment--equipmentDescription" style="white-space: pre-wrap;"></p>
      </div>
      <div class="field" id="viewWorkOrderEquipment--noteContainer">
        <label class="label">Note</label>
        <p id="viewWorkOrderEquipment--workOrderEquipmentNote" style="white-space: pre-wrap;"></p>
      </div>
    </section>
    <div class="modal-card-foot is-justify-content-right">
      <div class="buttons">
        <button class="button is-close-modal-button" type="button">
          Close
        </button>
      </div>
    </div>
  </div>
</div>
