<div
  class="modal"
  id="modal--ignoreWorkOrderAttachment"
  role="dialog"
  aria-label="Ignore Attachment in Future"
>
  <div class="modal-background"></div>
  <div class="modal-card">
    <div class="modal-card-head">
      <p class="modal-card-title">Ignore Attachment in Future</p>
      <button
        class="delete is-close-modal-button"
        type="button"
        aria-label="close"
      ></button>
    </div>
    <section class="modal-card-body">
      <form id="form--ignoreWorkOrderAttachment">
        <input
          id="ignoreWorkOrderAttachment--workOrderAttachmentId"
          name="workOrderAttachmentId"
          type="hidden"
        />
        <div class="field">
          <label class="label">Attachment</label>
          <p class="is-size-6" id="ignoreWorkOrderAttachment--attachmentFileName"></p>
        </div>
        <div class="field">
          <label class="label">Checksum</label>
          <p>
            <code id="ignoreWorkOrderAttachment--fileChecksum"></code>
          </p>
        </div>
        <div class="field">
          <label class="label" for="ignoreWorkOrderAttachment--noteText">
            Note
          </label>
          <div class="control">
            <textarea
              class="textarea"
              id="ignoreWorkOrderAttachment--noteText"
              name="noteText"
              maxlength="4000"
              required
            ></textarea>
          </div>
        </div>
      </form>
    </section>
    <div class="modal-card-foot is-justify-content-right">
      <div class="buttons">
        <button
          class="button is-warning"
          id="button--submitIgnoreAttachment"
          type="submit"
          form="form--ignoreWorkOrderAttachment"
        >
          <span class="icon"><i class="fa-solid fa-ban"></i></span>
          <span>Ignore Attachment</span>
        </button>
        <button class="button is-close-modal-button" type="button">
          Cancel
        </button>
      </div>
    </div>
  </div>
</div>
