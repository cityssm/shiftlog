<div
  class="modal"
  id="modal--editWorkOrderEquipmentNote"
  role="dialog"
  aria-label="Edit Equipment Note"
>
  <div class="modal-background"></div>
  <div class="modal-card">
    <div class="modal-card-head">
      <p class="modal-card-title">Edit <span data-section-alias="equipmentSectionNameSingular">Equipment</span> Note</p>
      <button
        class="delete is-close-modal-button"
        type="button"
        aria-label="close"
      ></button>
    </div>
    <section class="modal-card-body">
      <form id="form--editWorkOrderEquipmentNote">
        <input id="editWorkOrderEquipmentNote--workOrderId" name="workOrderId" type="hidden" />
        <input
          id="editWorkOrderEquipmentNote--equipmentNumber"
          name="equipmentNumber"
          type="hidden"
        />
        <div class="field">
          <label class="label" for="editWorkOrderEquipmentNote--workOrderEquipmentNote">
            Note
          </label>
          <div class="control">
            <textarea
              class="textarea"
              id="editWorkOrderEquipmentNote--workOrderEquipmentNote"
              name="workOrderEquipmentNote"
              maxlength="200"
            ></textarea>
          </div>
        </div>
      </form>
    </section>
    <div class="modal-card-foot is-justify-content-right">
      <div class="buttons">
        <button class="button is-success" type="submit" form="form--editWorkOrderEquipmentNote">
          <span class="icon"><i class="fa-solid fa-save"></i></span>
          <span>Update Note</span>
        </button>
        <button class="button is-close-modal-button" type="button">
          Cancel
        </button>
      </div>
    </div>
  </div>
</div>
